<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osobná vizitka</title>

<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --accent: #38bdf8;
    --muted: #94a3b8;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 18px;
    margin: 20px 0 10px;
    color: var(--accent);
  }

  p {
    color: var(--muted);
    line-height: 1.6;
  }

  .skills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .skill {
    background: rgba(56,189,248,0.1);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 14px;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
  }

  .socials a {
    text-decoration: none;
    color: var(--text);
    font-size: 20px;
    transition: 0.3s;
  }

  .socials a:hover {
    color: var(--accent);
    transform: scale(1.2);
  }
.qr img {
  width: 120px;
  height: 120px;
  border-radius: 10px;
}

  /* Responsive */
  @media (max-width: 480px) {
    .card {
      padding: 20px;
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      font-size: 16px;
    }
  }
</style>

<!-- Ikony (Font Awesome CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="card">
  <!-- Meno -->
  <h1>Matúš Kubis</h1>

  <!-- O mne -->
  <h2>O mne</h2>
  <p>
    Som študent, ktorý študuje Bezpečnostný manažment na Žilinskej univerzite v Žiline.
  </p>

  <!-- Zručnosti -->
  <h2>Zručnosti</h2>
  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">React</div>
  </div>

  <!-- Sociálne siete -->
  <h2>Kontakt</h2>
  <div class="socials">
    <a href="https://github.com/PapaCrabs"><i class="fab fa-github"></i></a>
    <a href="https://www.instagram.com/one.and.only_matthew/"><i class="fab fa-instagram"></i></a>
    <a href="mailto:matusik214@gmail.com"><i class="fas fa-envelope"></i></a>
  </div>
</div>
<div class="qr">
  <img src="qr.png" alt="QR kód">
</div>

</body>
</html>
